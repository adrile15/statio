<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Validar Código</title>
<script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-gray-100">

<!-- NAVBAR -->
<div class="flex justify-between items-center p-4 bg-white shadow">
    <div class="text-xl font-bold text-blue-600">Ⓟ Statio</div>

    <div class="flex items-center gap-6">
        <a href="javascript:history.back()" class="hover:underline">Volver</a>
        <span id="userName" class="font-semibold"></span>
        <button onclick="logout()" class="text-red-500">Salir</button>
    </div>
</div>

<!-- CONTENIDO -->
<div class="max-w-2xl mx-auto mt-16 text-center">

<!-- ICONO -->
<div class="flex justify-center mb-6">
    <div class="bg-blue-100 p-6 rounded-full text-blue-600 text-3xl">
        ⬛
    </div>
</div>

<h1 class="text-3xl font-bold mb-2">
Validar Código de Acceso
</h1>

<p class="text-gray-500 mb-10">
Ingresa el código de 6 caracteres para verificar la reserva
</p>

<!-- CARD -->
<div class="bg-white p-8 rounded-xl shadow text-left">

<h3 class="font-semibold mb-2">
Verificación de acceso
</h3>

<p class="text-gray-500 mb-6">
Los códigos son únicos para cada reserva y son sensibles a mayúsculas
</p>

<!-- INPUT -->
<input id="code" type="text"
placeholder="Introduce el código"
class="w-full p-3 border rounded-lg mb-4 text-center text-lg">

<button onclick="validate()"
class="w-full bg-black text-white p-3 rounded-lg mb-6">
Validar código
</button>

<!-- RESULTADO -->
<div id="resultContainer"></div>

</div>

</div>

<script>

// sesión
const user = JSON.parse(localStorage.getItem("user"));
if (!user) window.location.href = "login.html";
document.getElementById("userName").innerText = user.name;

// VALIDAR
async function validate(){

    const code = document.getElementById("code").value;

    const res = await fetch(`/api/reservations/validate?code=${code}`, {
        method: "POST"
    });

    const container = document.getElementById("resultContainer");

    if(res.ok){

        const data = await res.json();

        container.innerHTML = `
            <!-- SUCCESS -->
            <div class="bg-green-100 border border-green-300 p-4 rounded-lg mb-6">
                <p class="font-semibold text-green-700">Código válido</p>
                <p class="text-green-600">- Acceso autorizado</p>
            </div>

            <!-- INFO RESERVA -->
            <div class="bg-gray-50 p-6 rounded-lg">

                <h2 class="text-xl font-bold mb-2">
                    ${data.parkingSpot.title}
                </h2>

                <p class="text-gray-500 mb-4">
                    Reservado por: ${data.userName}
                </p>

                <div class="flex justify-between mb-4">
                    <div>
                        <p class="text-gray-400 text-sm">Fecha</p>
                        <p class="font-semibold">
                            ${formatDate(data.slot.date)}
                        </p>
                    </div>

                    <div>
                        <p class="text-gray-400 text-sm">Horario</p>
                        <p class="font-semibold">
                            ${data.slot.startTime} - ${data.slot.endTime}
                        </p>
                    </div>
                </div>

                <div class="bg-blue-50 border border-blue-200 p-4 rounded-lg text-center">
                    <p class="text-gray-500 text-sm">Código verificado</p>
                    <p class="text-2xl font-bold">${data.accessCode}</p>
                </div>

            </div>

            <button onclick="reset()"
            class="w-full mt-6 border p-3 rounded-lg">
            Validar otro código
            </button>
        `;

    } else {

        container.innerHTML = `
            <div class="bg-red-100 border border-red-300 p-4 rounded-lg">
                <p class="font-semibold text-red-700">Código inválido</p>
                <p class="text-red-600">Revisa el código o si ya fue usado</p>
            </div>
        `;
    }
}

// RESET
function reset(){
    document.getElementById("code").value = "";
    document.getElementById("resultContainer").innerHTML = "";
}

// FORMATEAR FECHA
function formatDate(dateStr){
    const date = new Date(dateStr);
    return date.toLocaleDateString("es-ES", {
        weekday: "long",
        day: "numeric",
        month: "long"
    });
}

// logout
function logout(){
    localStorage.removeItem("user");
    window.location.href="login.html";
}

</script>

</body>
</html>
