<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Statio - Registro</title>

<script src="https://cdn.tailwindcss.com"></script>

</head>

<body class="bg-gray-100 flex items-center justify-center h-screen">

<div class="bg-white p-10 rounded-xl shadow-md w-96">

<div class="text-center mb-6">
<div class="text-3xl font-bold text-blue-600">Ⓟ Statio</div>
<h2 class="text-2xl font-semibold mt-4">Crear Cuenta</h2>
<p class="text-gray-500 text-sm mt-2">Completa el formulario para registrarte</p>
</div>

<form id="registerForm">

<label class="block text-sm font-medium mb-1">Nombre completo</label>
<input id="name" type="text" placeholder="Juan Pérez"
class="w-full p-3 mb-4 border rounded-lg bg-gray-100">

<label class="block text-sm font-medium mb-1">Email</label>
<input id="email" type="email"
class="w-full p-3 mb-4 border rounded-lg bg-gray-100">

<label class="block text-sm font-medium mb-1">Contraseña</label>
<input id="password" type="password"
class="w-full p-3 mb-4 border rounded-lg bg-gray-100">

<label class="block text-sm font-medium mb-1">Confirmar contraseña</label>
<input id="confirmPassword" type="password"
class="w-full p-3 mb-6 border rounded-lg bg-gray-100">

<button
type="submit"
class="w-full bg-black text-white p-3 rounded-lg hover:bg-gray-800 transition">
Crear Cuenta
</button>

</form>

<p class="text-sm text-center mt-6">
¿Ya tienes cuenta?
<a href="login.html" class="text-blue-500 hover:underline">
Inicia sesión aquí
</a>
</p>

</div>


<script>

document.getElementById("registerForm").addEventListener("submit", async function(e){

e.preventDefault()

const name = document.getElementById("name").value
const email = document.getElementById("email").value
const password = document.getElementById("password").value
const confirmPassword = document.getElementById("confirmPassword").value

if(password !== confirmPassword){
alert("Las contraseñas no coinciden")
return
}

const response = await fetch("http://localhost:8081/api/auth/register",{

method:"POST",

headers:{
"Content-Type":"application/json"
},

body:JSON.stringify({
name:name,
email:email,
password:password
})

})

if(response.ok){

alert("Usuario creado correctamente")

window.location.href="login.html"

}else{

const error = await response.text()
alert(error)

}

})

</script>

</body>
</html>
