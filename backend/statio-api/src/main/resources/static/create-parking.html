<!DOCTYPE html>

<html lang="es">
<head>
<meta charset="UTF-8">
<title>Publicar Plaza</title>
<script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-gray-100">

<!-- NAVBAR -->

<div class="flex justify-between items-center p-4 bg-white shadow">

    <div class="text-xl font-bold text-blue-600">Ⓟ Statio</div>

    <div class="flex items-center gap-6">
        <a href="javascript:history.back()" class="hover:underline">Volver</a>
        <span id="userName" class="font-semibold"></span>
        <button onclick="logout()" class="text-red-500">Salir</button>
    </div>

</div>

<!-- CONTENIDO -->

<div class="max-w-4xl mx-auto mt-10 bg-white p-8 rounded-xl shadow">

<h2 class="text-2xl font-bold mb-2">Publicar Nueva Plaza</h2>
<p class="text-gray-500 mb-6">Completa la información y añade disponibilidad</p>

<form id="parkingForm" class="space-y-6">

<!-- Título -->

<input id="title" type="text" placeholder="Título"
class="w-full p-3 border rounded-lg" required>

<!-- Descripción -->

<textarea id="description" placeholder="Descripción"
class="w-full p-3 border rounded-lg"></textarea>

<!-- Ubicación -->

<input id="location" type="text" placeholder="Ubicación"
class="w-full p-3 border rounded-lg" required>

<!-- Tipo vehículo -->

<select id="vehicleType" class="w-full p-3 border rounded-lg">
<option>Coche</option>
<option>Moto</option>
<option>Grande</option>
</select>

<!-- Precio -->

<input id="price" type="number" placeholder="€/hora"
class="w-full p-3 border rounded-lg" required>

<!-- IMÁGENES -->

<div>
<label class="block font-semibold mb-2">Imágenes</label>
<div id="imagesContainer" class="space-y-2">
<input type="text" placeholder="URL imagen" class="w-full p-2 border rounded">
</div>
<button type="button" onclick="addImageField()" class="mt-2 text-blue-500">
+ Añadir imagen
</button>
</div>

<!-- FRANJAS -->

<div>
<label class="block font-semibold mb-2">Disponibilidad</label>

<div id="slotsContainer" class="space-y-3"></div>

<button type="button" onclick="addSlot()" class="text-blue-500 mt-2">
+ Añadir franja
</button>
</div>

<!-- BOTÓN -->

<button class="w-full bg-black text-white p-3 rounded-lg">
Publicar Plaza
</button>

</form>

</div>

<script>

// sesión
const user = JSON.parse(localStorage.getItem("user"));
if (!user) window.location.href = "login.html";

// añadir imagen
function addImageField(){
    const container = document.getElementById("imagesContainer");
    const input = document.createElement("input");
    input.type = "text";
    input.placeholder = "URL imagen";
    input.className = "w-full p-2 border rounded";
    container.appendChild(input);
}

// añadir franja
function addSlot(){
    const container = document.getElementById("slotsContainer");

    const div = document.createElement("div");
    div.className = "grid grid-cols-3 gap-2";

    div.innerHTML = `
        <input type="date" class="slot-date p-2 border rounded" required>
        <input type="time" class="slot-start p-2 border rounded" required>
        <input type="time" class="slot-end p-2 border rounded" required>
    `;

    container.appendChild(div);
}

document.getElementById("userName").innerText = user.name;

// submit
document.getElementById("parkingForm").addEventListener("submit", async (e)=>{
    e.preventDefault();

    const images = Array.from(document.querySelectorAll("#imagesContainer input"))
        .map(i => i.value)
        .filter(v => v !== "");

    const slots = Array.from(document.querySelectorAll("#slotsContainer > div"))
        .map(div => ({
            date: div.querySelector(".slot-date").value,
            startTime: div.querySelector(".slot-start").value,
            endTime: div.querySelector(".slot-end").value
        }));

    const data = {
        title: document.getElementById("title").value,
        description: document.getElementById("description").value,
        location: document.getElementById("location").value,
        vehicleType: document.getElementById("vehicleType").value,
        price: parseFloat(document.getElementById("price").value),
        images: images,
        userId: user.id,
        slots: slots
    };

    const res = await fetch("/api/parking", {
        method: "POST",
        headers: {"Content-Type": "application/json"},
        body: JSON.stringify(data)
    });

    if(res.ok){
        alert("Plaza creada correctamente");
        window.location.href = "index.html";
    } else {
        alert("Error al crear la plaza");
    }
});

// logout
function logout(){
    localStorage.removeItem("user");
    window.location.href="login.html";
}

// añadir una franja por defecto
addSlot();

</script>

</body>
</html>
