<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Publicar Plaza</title>
<script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-gray-100">

<!-- NAVBAR -->
<div class="flex justify-between items-center p-4 bg-white shadow">
    <div class="text-xl font-bold text-blue-600">Ⓟ Statio</div>
    <div class="flex gap-4">
        <a href="index.html">Inicio</a>
        <button onclick="logout()" class="text-red-500">Salir</button>
    </div>
</div>

<!-- CONTENIDO -->
<div class="max-w-4xl mx-auto mt-10 bg-white p-8 rounded-xl shadow">

<h2 class="text-2xl font-bold mb-2">Publicar Nueva Plaza de Parking</h2>
<p class="text-gray-500 mb-6">Completa la información de tu plaza</p>

<form id="parkingForm" class="space-y-6">

<!-- Título -->
<input id="title" type="text" placeholder="Título"
class="w-full p-3 border rounded-lg" required>

<!-- Descripción -->
<textarea id="description" placeholder="Descripción"
class="w-full p-3 border rounded-lg"></textarea>

<!-- Ubicación -->
<input id="location" type="text" placeholder="Ubicación"
class="w-full p-3 border rounded-lg" required>

<!-- Tipo vehículo -->
<select id="vehicleType" class="w-full p-3 border rounded-lg">
<option>Coche</option>
<option>Moto</option>
<option>Grande</option>
</select>

<!-- Precio -->
<input id="price" type="number" placeholder="€/hora"
class="w-full p-3 border rounded-lg" required>

<!-- DIMENSIONES -->
<input id="dimensions" type="text" placeholder="Dimensiones (opcional)"
class="w-full p-3 border rounded-lg">

<!-- IMÁGENES -->
<div>
    <label class="block font-semibold mb-2">Imágenes (URLs)</label>

    <div id="imagesContainer" class="space-y-2">
        <input type="text" placeholder="URL imagen"
        class="w-full p-2 border rounded">
    </div>

    <button type="button" onclick="addImageField()"
    class="mt-2 text-blue-500">
    + Añadir imagen
    </button>
</div>

<!-- BOTÓN -->
<button class="w-full bg-black text-white p-3 rounded-lg">
Publicar Plaza
</button>

</form>

</div>

<script>

// sesión
const user = JSON.parse(localStorage.getItem("user"));
if (!user) window.location.href = "login.html";

// añadir imagen
function addImageField(){
    const container = document.getElementById("imagesContainer");
    const input = document.createElement("input");
    input.type = "text";
    input.placeholder = "URL imagen";
    input.className = "w-full p-2 border rounded";
    container.appendChild(input);
}

// submit
document.getElementById("parkingForm").addEventListener("submit", async (e)=>{
    e.preventDefault();

    const images = Array.from(document.querySelectorAll("#imagesContainer input"))
        .map(i => i.value)
        .filter(v => v !== "");

    const data = {
        title: document.getElementById("title").value,
        description: document.getElementById("description").value,
        location: document.getElementById("location").value,
        vehicleType: document.getElementById("vehicleType").value,
        price: parseFloat(document.getElementById("price").value),
        images: images,
        userId: user.id
    };

    const res = await fetch("/api/parking", {
        method: "POST",
        headers: {"Content-Type": "application/json"},
        body: JSON.stringify(data)
    });

    if(res.ok){
        alert("Plaza creada");
        window.location.href = "index.html";
    } else {
        alert("Error");
    }
});

// logout
function logout(){
    localStorage.removeItem("user");
    window.location.href="login.html";
}

</script>

</body>
</html>
