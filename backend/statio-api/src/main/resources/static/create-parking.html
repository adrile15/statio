<!DOCTYPE html>

<html lang="es">
<head>
<meta charset="UTF-8">
<title>Publicar Plaza</title>

<script src="https://cdn.tailwindcss.com"></script>

<link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css" />
<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

</head>

<body class="bg-gray-100">

<!-- NAVBAR -->
<div class="flex justify-between items-center p-4 bg-white shadow">

    <div class="text-xl font-bold text-blue-600">Ⓟ Statio</div>

    <div class="flex items-center gap-6">
        <a href="javascript:history.back()" class="hover:underline">Volver</a>
        <span id="userName" class="font-semibold"></span>
        <button onclick="logout()" class="text-red-500">Salir</button>
    </div>

</div>

<!-- CONTENIDO -->
<div class="max-w-4xl mx-auto mt-10 bg-white p-8 rounded-xl shadow">

<h2 class="text-2xl font-bold mb-2">
Publicar Nueva Plaza
</h2>

<p class="text-gray-500 mb-6">
Completa la información y selecciona la ubicación exacta
</p>

<form id="parkingForm" class="space-y-6">

<!-- TÍTULO -->
<input id="title"
type="text"
placeholder="Título"
class="w-full p-3 border rounded-lg"
required>

<!-- DESCRIPCIÓN -->
<textarea id="description"
placeholder="Descripción"
class="w-full p-3 border rounded-lg"></textarea>

<!-- UBICACIÓN -->
<div class="relative">

    <input id="location"
    type="text"
    placeholder="Buscar ubicación..."
    class="w-full p-3 border rounded-lg"
    autocomplete="off"
    required>

    <!-- SUGERENCIAS -->
    <div id="suggestions"
    class="absolute w-full bg-white border rounded-lg shadow mt-1 hidden z-50 max-h-64 overflow-y-auto">
    </div>

</div>

<!-- MAPA -->
<div>

    <label class="block font-semibold mb-2">
        Selecciona ubicación en el mapa
    </label>

    <div id="map"
    class="w-full h-96 rounded-lg border"></div>

</div>

<input type="hidden" id="latitude">
<input type="hidden" id="longitude">

<!-- VEHÍCULO -->
<select id="vehicleType"
class="w-full p-3 border rounded-lg">

<option>Coche</option>
<option>Moto</option>
<option>Furgoneta</option>
<option>Camion</option>

</select>

<!-- PRECIO -->
<input id="price"
type="number"
placeholder="€/hora"
class="w-full p-3 border rounded-lg"
required>

<!-- IMÁGENES -->
<div>

<label class="block font-semibold mb-2">
Imágenes
</label>

<div id="imagesContainer" class="space-y-2">

<input type="text"
placeholder="URL imagen"
class="w-full p-2 border rounded">

</div>

<button type="button"
onclick="addImageField()"
class="mt-2 text-blue-500">

+ Añadir imagen

</button>

</div>

<!-- FRANJAS -->
<div>

<label class="block font-semibold mb-2">
Disponibilidad
</label>

<div id="slotsContainer" class="space-y-3"></div>

<button type="button"
onclick="addSlot()"
class="text-blue-500 mt-2">

+ Añadir franja

</button>

</div>

<!-- BOTÓN -->
<button class="w-full bg-black text-white p-3 rounded-lg">

Publicar Plaza

</button>

</form>

</div>

<script>

// sesión
const user = JSON.parse(localStorage.getItem("user"));

if (!user){
    window.location.href = "login.html";
}

document.getElementById("userName").innerText = user.name;

// mapa
let map;
let marker;

// iniciar mapa
function initMap(){

    map = L.map('map').setView([40.4168, -3.7038], 6);

    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {

        attribution: '&copy; OpenStreetMap'

    }).addTo(map);

    // click mapa
    map.on('click', async function(e){

        const lat = e.latlng.lat;
        const lng = e.latlng.lng;

        setMarker(lat, lng);

        // reverse geocoding DESDE BACKEND
        try{

            const res = await fetch(
                `/api/geocoding/reverse?lat=${lat}&lon=${lng}`
            );

            const data = await res.json();

            if(data.display_name){

                document.getElementById("location").value =
                    data.display_name;
            }

        } catch(err){

            console.log(err);
        }
    });
}

// mover marcador
function setMarker(lat, lng){

    if(marker){
        map.removeLayer(marker);
    }

    marker = L.marker([lat, lng]).addTo(map);

    map.setView([lat, lng], 15);

    document.getElementById("latitude").value = lat;
    document.getElementById("longitude").value = lng;
}

// autocomplete ubicación
const locationInput =
    document.getElementById("location");

const suggestionsBox =
    document.getElementById("suggestions");

let searchTimeout;

locationInput.addEventListener("input", () => {

    clearTimeout(searchTimeout);

    searchTimeout = setTimeout(async () => {

        const query = locationInput.value.trim();

        if(query.length < 3){

            suggestionsBox.classList.add("hidden");
            suggestionsBox.innerHTML = "";

            return;
        }

        try{

            // FETCH A TU BACKEND
            const res = await fetch(
                `/api/geocoding/search?query=${encodeURIComponent(query)}`
            );

            const data = await res.json();

            suggestionsBox.innerHTML = "";

            if(!data || data.length === 0){

                suggestionsBox.classList.add("hidden");
                return;
            }

            data.forEach(place => {

                const item = document.createElement("div");

                item.className =
                    "p-3 hover:bg-gray-100 cursor-pointer border-b text-sm";

                item.innerText = place.display_name;

                item.onclick = () => {

                    const lat = parseFloat(place.lat);
                    const lng = parseFloat(place.lon);

                    locationInput.value = place.display_name;

                    setMarker(lat, lng);

                    suggestionsBox.classList.add("hidden");
                };

                suggestionsBox.appendChild(item);
            });

            suggestionsBox.classList.remove("hidden");

        } catch(err){

            console.error("Error buscando ubicación:", err);
        }

    }, 700);
});

// cerrar sugerencias
document.addEventListener("click", (e) => {

    if(!suggestionsBox.contains(e.target) &&
       e.target !== locationInput){

        suggestionsBox.classList.add("hidden");
    }
});

// añadir imagen
function addImageField(){

    const container =
        document.getElementById("imagesContainer");

    const input = document.createElement("input");

    input.type = "text";
    input.placeholder = "URL imagen";

    input.className =
        "w-full p-2 border rounded";

    container.appendChild(input);
}

// añadir franja
function addSlot(){

    const container =
        document.getElementById("slotsContainer");

    const div = document.createElement("div");

    div.className =
        "grid grid-cols-3 gap-2";

    div.innerHTML = `

        <input type="date"
        class="slot-date p-2 border rounded"
        required>

        <input type="time"
        class="slot-start p-2 border rounded"
        required>

        <input type="time"
        class="slot-end p-2 border rounded"
        required>
    `;

    container.appendChild(div);
}

// submit
document.getElementById("parkingForm")
.addEventListener("submit", async (e)=>{

    e.preventDefault();

    // validar mapa
    if(!document.getElementById("latitude").value){

        alert("Selecciona una ubicación válida");

        return;
    }

    const images = Array.from(
        document.querySelectorAll("#imagesContainer input")
    )
    .map(i => i.value)
    .filter(v => v !== "");

    const slots = Array.from(
        document.querySelectorAll("#slotsContainer > div")
    )
    .map(div => ({

        date:
            div.querySelector(".slot-date").value,

        startTime:
            div.querySelector(".slot-start").value,

        endTime:
            div.querySelector(".slot-end").value
    }));

    const data = {

        title:
            document.getElementById("title").value,

        description:
            document.getElementById("description").value,

        location:
            document.getElementById("location").value,

        vehicleType:
            document.getElementById("vehicleType").value,

        price:
            parseFloat(document.getElementById("price").value),

        latitude:
            parseFloat(document.getElementById("latitude").value),

        longitude:
            parseFloat(document.getElementById("longitude").value),

        images:
            images,

        userId:
            user.id,

        slots:
            slots
    };

    const res = await fetch("/api/parking", {

        method: "POST",

        headers: {
            "Content-Type": "application/json"
        },

        body: JSON.stringify(data)
    });

    if(res.ok){

        alert("Plaza creada correctamente");

        window.location.href = "index.html";

    } else {

        alert("Error al crear la plaza");
    }
});

// logout
function logout(){

    localStorage.removeItem("user");

    window.location.href = "login.html";
}

// iniciar
addSlot();
initMap();

</script>

</body>
</html>
