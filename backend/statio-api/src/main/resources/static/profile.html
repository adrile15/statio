<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Mi Perfil</title>

<script src="https://cdn.tailwindcss.com"></script>

</head>

<body class="bg-gray-100">

<!-- NAVBAR -->
<div class="flex justify-between items-center p-4 bg-white shadow">

    <div class="text-xl font-bold text-blue-600">
        Ⓟ Statio
    </div>

    <div class="flex items-center gap-6">
        <a href="javascript:history.back()" class="hover:underline">
            Volver
        </a>

        <span id="userName" class="font-semibold"></span>

        <button onclick="logout()" class="text-red-500">
            Salir
        </button>
    </div>

</div>

<!-- CONTENIDO -->
<div class="max-w-7xl mx-auto p-8">

    <!-- HEADER PERFIL -->
    <div class="bg-white rounded-2xl shadow p-8 mb-10">

        <h1 class="text-4xl font-bold mb-2">
            Mi Perfil
        </h1>

        <p class="text-gray-500 mb-8">
            Gestiona tus publicaciones y revisa el estado de tus plazas
        </p>

        <!-- STATS -->
        <div class="grid grid-cols-3 gap-6">

            <div class="bg-blue-50 p-6 rounded-2xl">
                <p class="text-gray-500 text-sm mb-1">
                    Total publicaciones
                </p>

                <p id="totalParkings"
                class="text-3xl font-bold text-blue-600">
                    0
                </p>
            </div>

            <div class="bg-green-50 p-6 rounded-2xl">
                <p class="text-gray-500 text-sm mb-1">
                    Activas
                </p>

                <p id="activeParkings"
                class="text-3xl font-bold text-green-600">
                    0
                </p>
            </div>

            <div class="bg-gray-100 p-6 rounded-2xl">
                <p class="text-gray-500 text-sm mb-1">
                    Expiradas
                </p>

                <p id="expiredParkings"
                class="text-3xl font-bold text-gray-600">
                    0
                </p>
            </div>

        </div>

    </div>

    <!-- ACTIVAS -->
    <div class="mb-12">

        <div class="flex justify-between items-center mb-6">

            <h2 class="text-2xl font-bold">
                Publicaciones activas
            </h2>

        </div>

        <div id="activeContainer"
        class="grid grid-cols-3 gap-8">
        </div>

    </div>

    <!-- EXPIRADAS -->
    <div>

        <h2 class="text-2xl font-bold mb-6">
            Historial / Expiradas
        </h2>

        <div id="expiredContainer"
        class="grid grid-cols-3 gap-8">
        </div>

    </div>

</div>

<script>

// sesión
const user = JSON.parse(localStorage.getItem("user"));

if(!user){
    window.location.href = "login.html";
}

document.getElementById("userName").innerText = user.name;

// logout
function logout(){

    localStorage.removeItem("user");

    window.location.href = "login.html";
}

// cargar publicaciones
async function loadProfile(){

    const res = await fetch(`/api/parking/user/${user.id}`);

    const parkings = await res.json();

    const activeContainer =
        document.getElementById("activeContainer");

    const expiredContainer =
        document.getElementById("expiredContainer");

    activeContainer.innerHTML = "";
    expiredContainer.innerHTML = "";

    let activeCount = 0;
    let expiredCount = 0;

    parkings.forEach(p => {

        const expired = isParkingExpired(p);

        if(expired){
            expiredCount++;
        } else {
            activeCount++;
        }

        const image =
            (p.images && p.images.length > 0)
            ? p.images[0]
            : "";

        const card = `
        <div class="bg-white rounded-2xl shadow overflow-hidden">

            ${
                image

                ? `<img src="${image}"
                   class="w-full h-52 object-cover">`

                : `<div class="w-full h-52 bg-gray-200 flex items-center justify-center text-gray-500">
                    Sin imagen
                   </div>`
            }

            <div class="p-6">

                <div class="flex justify-between items-center mb-3">

                    <h3 class="font-bold text-lg">
                        ${p.title}
                    </h3>

                    <span class="
                    ${expired
                        ? "bg-gray-200 text-gray-700"
                        : "bg-green-100 text-green-700"}
                    px-3 py-1 rounded-full text-xs font-semibold">

                        ${expired ? "EXPIRADA" : "ACTIVA"}

                    </span>

                </div>

                <p class="text-gray-500 mb-3">
                    ${p.location}
                </p>

                <p class="text-sm text-gray-700 mb-4">
                    ${p.description || ""}
                </p>

                <div class="flex justify-between items-center mb-5">

                    <span class="font-bold text-blue-600">
                        €${p.price}/hora
                    </span>

                    <span class="text-sm text-gray-500">
                        ${p.availabilitySlots?.length || 0} franjas
                    </span>

                </div>

                <div class="flex gap-3">

                    <a href="parking-details.html?id=${p.id}"
                    class="flex-1 text-center bg-black text-white py-2 rounded-xl hover:bg-gray-800">
                    Ver
                    </a>

                    <a href="edit-parking.html?id=${p.id}"
                    class="flex-1 text-center border py-2 rounded-xl hover:bg-gray-100">
                    Editar
                    </a>

                    <button
                    onclick="deleteParking(${p.id})"
                    class="flex-1 border border-red-500 text-red-500 py-2 rounded-xl hover:bg-red-50">
                    Eliminar
                    </button>

                </div>

            </div>

        </div>
        `;

        if(expired){
            expiredContainer.innerHTML += card;
        } else {
            activeContainer.innerHTML += card;
        }

    });

    // stats
    document.getElementById("totalParkings").innerText =
        parkings.length;

    document.getElementById("activeParkings").innerText =
        activeCount;

    document.getElementById("expiredParkings").innerText =
        expiredCount;
}

// detectar expiración
function isParkingExpired(parking){

    if(!parking.availabilitySlots ||
       parking.availabilitySlots.length === 0){

        return true;
    }

    const now = new Date();

    // si alguna franja sigue futura => activa
    const hasFutureSlot = parking.availabilitySlots.some(slot => {

        const endDateTime =
            new Date(`${slot.date}T${slot.endTime}`);

        return endDateTime > now;
    });

    return !hasFutureSlot;
}

// eliminar
async function deleteParking(id){

    const confirmDelete =
        confirm("¿Seguro que quieres eliminar esta publicación?");

    if(!confirmDelete){
        return;
    }

    const res = await fetch(`/api/parking/${id}`, {

        method: "DELETE"
    });

    if(res.ok){

        alert("Publicación eliminada");

        loadProfile();

    } else {

        alert("Error eliminando publicación");
    }
}

// iniciar
loadProfile();

</script>

</body>
</html>
