<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Editar Plaza</title>

<script src="https://cdn.tailwindcss.com"></script>

<link rel="stylesheet"
href="https://unpkg.com/leaflet/dist/leaflet.css" />

<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

</head>

<body class="bg-gray-100">

<!-- NAVBAR -->
<div class="flex justify-between items-center p-4 bg-white shadow">

    <div class="text-xl font-bold text-blue-600">
        Ⓟ Statio
    </div>

    <div class="flex items-center gap-6">

        <a href="profile.html"
        class="hover:underline">
            Volver
        </a>

        <a href="profile.html"
        id="userName"
        class="font-semibold hover:underline">
        </a>

        <button onclick="logout()"
        class="text-red-500">
            Salir
        </button>

    </div>

</div>

<!-- CONTENIDO -->
<div class="max-w-4xl mx-auto mt-10 bg-white p-8 rounded-xl shadow">

<h2 class="text-2xl font-bold mb-2">
Editar Plaza
</h2>

<p class="text-gray-500 mb-6">
Actualiza la información de tu plaza
</p>

<form id="parkingForm" class="space-y-6">

<!-- TÍTULO -->
<input
id="title"
type="text"
placeholder="Título"
class="w-full p-3 border rounded-lg"
required>

<!-- DESCRIPCIÓN -->
<textarea
id="description"
placeholder="Descripción"
class="w-full p-3 border rounded-lg"></textarea>

<!-- UBICACIÓN -->
<div class="relative">

    <input
    id="location"
    type="text"
    placeholder="Buscar ubicación..."
    class="w-full p-3 border rounded-lg"
    autocomplete="off"
    required>

    <!-- SUGERENCIAS -->
    <div
    id="suggestions"
    class="absolute w-full bg-white border rounded-lg shadow mt-1 hidden z-50 max-h-64 overflow-y-auto">
    </div>

</div>

<!-- MAPA -->
<div>

    <label class="block font-semibold mb-2">
        Selecciona ubicación en el mapa
    </label>

    <div
    id="map"
    class="w-full h-96 rounded-lg border">
    </div>

</div>

<input type="hidden" id="latitude">
<input type="hidden" id="longitude">

<!-- VEHÍCULO -->
<select
id="vehicleType"
class="w-full p-3 border rounded-lg">

<option>Coche</option>
<option>Moto</option>
<option>Furgoneta</option>
<option>Camion</option>

</select>

<!-- PRECIO -->
<input
id="price"
type="number"
placeholder="€/hora"
class="w-full p-3 border rounded-lg"
required>

<!-- IMÁGENES -->
<div>

<label class="block font-semibold mb-2">
Imágenes
</label>

<input
id="imageInput"
type="file"
multiple
accept="image/*"
class="w-full p-3 border rounded-lg">

<!-- PREVIEW -->
<div
id="previewContainer"
class="grid grid-cols-3 gap-4 mt-4">
</div>

</div>

<!-- DISPONIBILIDAD -->
<div>

<label class="block font-semibold mb-2">
Disponibilidad
</label>

<div id="slotsContainer" class="space-y-3"></div>

<button
type="button"
onclick="addSlot()"
class="text-blue-500 mt-2">

+ Añadir franja

</button>

</div>

<!-- BOTÓN -->
<button
class="w-full bg-black text-white p-3 rounded-lg hover:bg-gray-800 transition">

Guardar cambios

</button>

</form>

</div>

<script>

// =======================
// SESIÓN
// =======================

const user =
    JSON.parse(localStorage.getItem("user"));

if(!user){

    window.location.href = "login.html";
}

document.getElementById("userName")
.innerText = user.name;

// =======================
// ID PARKING
// =======================

const params =
    new URLSearchParams(window.location.search);

const parkingId =
    params.get("id");

// =======================
// MAPA
// =======================

let map;
let marker;

function initMap(){

    map = L.map('map')
    .setView([40.4168, -3.7038], 6);

    L.tileLayer(
        'https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',
        {
            attribution: '&copy; OpenStreetMap'
        }
    ).addTo(map);

    // click mapa
    map.on('click', async function(e){

        const lat = e.latlng.lat;
        const lng = e.latlng.lng;

        setMarker(lat, lng);

        try{

            const res = await fetch(
                `/api/geocoding/reverse?lat=${lat}&lon=${lng}`
            );

            const data = await res.json();

            if(data.display_name){

                document.getElementById("location").value =
                    data.display_name;
            }

        } catch(err){

            console.log(err);
        }
    });
}

// mover marker
function setMarker(lat, lng){

    if(marker){

        map.removeLayer(marker);
    }

    marker = L.marker([lat, lng]).addTo(map);

    map.setView([lat, lng], 15);

    document.getElementById("latitude").value = lat;

    document.getElementById("longitude").value = lng;
}

// =======================
// AUTOCOMPLETE
// =======================

const locationInput =
    document.getElementById("location");

const suggestionsBox =
    document.getElementById("suggestions");

let searchTimeout;

locationInput.addEventListener("input", () => {

    clearTimeout(searchTimeout);

    searchTimeout = setTimeout(async () => {

        const query = locationInput.value.trim();

        if(query.length < 3){

            suggestionsBox.classList.add("hidden");

            suggestionsBox.innerHTML = "";

            return;
        }

        try{

            const res = await fetch(
                `/api/geocoding/search?query=${encodeURIComponent(query)}`
            );

            const data = await res.json();

            suggestionsBox.innerHTML = "";

            if(!data || data.length === 0){

                suggestionsBox.classList.add("hidden");

                return;
            }

            data.forEach(place => {

                const item =
                    document.createElement("div");

                item.className =
                    "p-3 hover:bg-gray-100 cursor-pointer border-b text-sm";

                item.innerText =
                    place.display_name;

                item.onclick = () => {

                    const lat =
                        parseFloat(place.lat);

                    const lng =
                        parseFloat(place.lon);

                    locationInput.value =
                        place.display_name;

                    setMarker(lat, lng);

                    suggestionsBox.classList.add("hidden");
                };

                suggestionsBox.appendChild(item);
            });

            suggestionsBox.classList.remove("hidden");

        } catch(err){

            console.log(err);
        }

    }, 500);
});

// cerrar autocomplete
document.addEventListener("click", (e) => {

    if(!suggestionsBox.contains(e.target) &&
       e.target !== locationInput){

        suggestionsBox.classList.add("hidden");
    }
});

// =======================
// SLOTS
// =======================

function addSlot(date="", start="", end=""){

    const container =
        document.getElementById("slotsContainer");

    const div =
        document.createElement("div");

    div.className =
        "grid grid-cols-3 gap-2";

    div.innerHTML = `

        <input
        type="date"
        value="${date}"
        class="slot-date p-2 border rounded"
        required>

        <input
        type="time"
        value="${start}"
        class="slot-start p-2 border rounded"
        required>

        <input
        type="time"
        value="${end}"
        class="slot-end p-2 border rounded"
        required>
    `;

    container.appendChild(div);
}

// =======================
// IMÁGENES
// =======================

let uploadedImages = [];

document.getElementById("imageInput")
.addEventListener("change", async function(e){

    const files = e.target.files;

    for(const file of files){

        const formData = new FormData();

        formData.append("file", file);

        try{

            const res = await fetch(
                "/api/images/upload",
                {
                    method: "POST",
                    body: formData
                }
            );

            if(!res.ok){

                alert("Error subiendo imagen");

                continue;
            }

            const imageUrl = await res.text();

            uploadedImages.push(imageUrl);

            renderImages();

        } catch(err){

            console.log(err);

            alert("Error subiendo imagen");
        }
    }
});

// render imágenes
function renderImages(){

    const preview =
        document.getElementById("previewContainer");

    preview.innerHTML = "";

    uploadedImages.forEach((imgUrl, index) => {

        const wrapper =
            document.createElement("div");

        wrapper.className = "relative";

        wrapper.innerHTML = `

            <img
            src="${imgUrl}"
            class="w-full h-32 object-cover rounded-lg border">

            <button
            type="button"
            onclick="removeImage(${index})"
            class="absolute top-2 right-2 bg-red-500 text-white rounded-full w-6 h-6 text-sm">
            ✕
            </button>
        `;

        preview.appendChild(wrapper);
    });
}

function removeImage(index){

    uploadedImages.splice(index, 1);

    renderImages();
}

// =======================
// CARGAR PARKING
// =======================

async function loadParking(){

    const res = await fetch(
        `/api/parking/${parkingId}`
    );

    const p = await res.json();

    document.getElementById("title").value =
        p.title;

    document.getElementById("description").value =
        p.description;

    document.getElementById("location").value =
        p.location;

    document.getElementById("vehicleType").value =
        p.vehicleType;

    document.getElementById("price").value =
        p.price;

    // marker
    if(p.latitude && p.longitude){

        setMarker(
            p.latitude,
            p.longitude
        );
    }

    // imágenes
    uploadedImages = p.images || [];

    renderImages();

    // slots
    document.getElementById("slotsContainer")
    .innerHTML = "";

    if(p.availabilitySlots &&
       p.availabilitySlots.length > 0){

        p.availabilitySlots.forEach(slot => {

            addSlot(
                slot.date,
                slot.startTime,
                slot.endTime
            );
        });

    } else {

        addSlot();
    }
}

// =======================
// SUBMIT
// =======================

document.getElementById("parkingForm")
.addEventListener("submit", async (e)=>{

    e.preventDefault();

    if(!document.getElementById("latitude").value){

        alert("Selecciona una ubicación válida");

        return;
    }

    const slots = Array.from(
        document.querySelectorAll("#slotsContainer > div")
    )
    .map(div => ({

        date:
            div.querySelector(".slot-date").value,

        startTime:
            div.querySelector(".slot-start").value,

        endTime:
            div.querySelector(".slot-end").value
    }));

    const data = {

        title:
            document.getElementById("title").value,

        description:
            document.getElementById("description").value,

        location:
            document.getElementById("location").value,

        vehicleType:
            document.getElementById("vehicleType").value,

        price:
            parseFloat(
                document.getElementById("price").value
            ),

        latitude:
            parseFloat(
                document.getElementById("latitude").value
            ),

        longitude:
            parseFloat(
                document.getElementById("longitude").value
            ),

        images:
            uploadedImages,

        userId:
            user.id,

        slots:
            slots
    };

    try{

        const res = await fetch(
            `/api/parking/${parkingId}`,
            {

                method: "PUT",

                headers: {
                    "Content-Type": "application/json"
                },

                body: JSON.stringify(data)
            }
        );

        if(res.ok){

            alert("Plaza actualizada");

            window.location.href = "profile.html";

        } else {

            const error = await res.text();

            console.log(error);

            alert("Error al actualizar");
        }

    } catch(err){

        console.log(err);

        alert("Error del servidor");
    }
});

// =======================
// LOGOUT
// =======================

function logout(){

    localStorage.removeItem("user");

    window.location.href = "login.html";
}

// =======================
// INIT
// =======================

initMap();

loadParking();

</script>

</body>
</html>
