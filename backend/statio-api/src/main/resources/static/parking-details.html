<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Detalles del Parking</title>

<script src="https://cdn.tailwindcss.com"></script>

<link rel="stylesheet"
href="https://unpkg.com/leaflet/dist/leaflet.css" />

<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

</head>

<body class="bg-gray-100">

<!-- NAVBAR -->
<div class="flex justify-between items-center p-4 bg-white shadow">

    <div class="text-xl font-bold text-blue-600">
        Ⓟ Statio
    </div>

    <div class="flex items-center gap-6">

        <a href="javascript:history.back()"
        class="hover:underline">
            Volver
        </a>

        <a href="profile.html"
        id="userName"
        class="font-semibold hover:underline cursor-pointer">
        </a>

        <button onclick="logout()"
        class="text-red-500">
            Salir
        </button>

    </div>

</div>

<!-- CONTENIDO -->
<div class="max-w-6xl mx-auto mt-10 bg-white p-8 rounded-2xl shadow">

<!-- IMÁGENES -->
<div id="imageWrapper"
class="relative mb-6 hidden">

    <img id="mainImage"
    class="w-full h-96 object-cover rounded-xl">

    <button onclick="prevImage()"
    class="absolute left-4 top-1/2 -translate-y-1/2 bg-white px-4 py-2 rounded-full shadow">
    ◀
    </button>

    <button onclick="nextImage()"
    class="absolute right-4 top-1/2 -translate-y-1/2 bg-white px-4 py-2 rounded-full shadow">
    ▶
    </button>

</div>

<!-- INFO -->
<div class="flex justify-between items-start mb-6">

    <div>

        <h1 id="title"
        class="text-4xl font-bold mb-2"></h1>

        <p id="location"
        class="text-gray-500 text-lg"></p>

    </div>

    <div class="text-right">

        <p id="price"
        class="text-3xl font-bold text-blue-600"></p>

        <p class="text-gray-500">
            por hora
        </p>

    </div>

</div>

<p id="description"
class="mb-10 text-gray-700 text-lg leading-relaxed"></p>

<!-- MAPA -->
<div class="mb-10">

    <h3 class="text-2xl font-bold mb-4">
        Ubicación
    </h3>

    <div id="map"
    class="w-full h-96 rounded-2xl shadow-xl">
    </div>

</div>

<!-- DISPONIBILIDAD -->
<div>

    <h3 class="text-2xl font-bold mb-6">
        Disponibilidad
    </h3>

    <div id="slotsContainer"
    class="space-y-4">
    </div>

</div>

<!-- BOTÓN -->
<button onclick="openPaymentModal()"
class="mt-8 w-full bg-black hover:bg-gray-800 transition text-white p-4 rounded-xl text-lg font-semibold">

Reservar plaza

</button>

</div>

<!-- MODAL PAGO -->
<div id="paymentModal"
class="fixed inset-0 bg-black bg-opacity-50 hidden flex items-center justify-center z-50">

    <div class="bg-white rounded-2xl p-8 w-[450px]">

        <h2 class="text-2xl font-bold mb-6 text-center">
            Finalizar pago
        </h2>

        <div class="space-y-4">

            <input
            id="cardName"
            type="text"
            placeholder="Nombre del titular"
            class="w-full p-3 border rounded-xl">

            <input
            id="cardNumber"
            type="text"
            placeholder="4242 4242 4242 4242"
            class="w-full p-3 border rounded-xl">

            <div class="grid grid-cols-2 gap-4">

                <input
                id="cardDate"
                type="text"
                placeholder="MM/AA"
                class="w-full p-3 border rounded-xl">

                <input
                id="cardCVV"
                type="text"
                placeholder="CVV"
                class="w-full p-3 border rounded-xl">

            </div>

        </div>

        <div class="flex gap-4 mt-8">

            <button onclick="processPayment()"
            class="flex-1 bg-green-500 hover:bg-green-600 text-white p-3 rounded-xl font-semibold transition">

            Pagar

            </button>

            <button onclick="closePaymentModal()"
            class="flex-1 bg-gray-200 hover:bg-gray-300 p-3 rounded-xl transition">

            Cancelar

            </button>

        </div>

        <!-- LOADING -->
        <div id="loadingPayment"
        class="hidden text-center mt-6">

            <div class="animate-spin rounded-full h-10 w-10 border-b-2 border-black mx-auto mb-4">
            </div>

            <p class="font-semibold">
                Procesando pago...
            </p>

        </div>

    </div>

</div>

<script>

// =======================
// USUARIO
// =======================

const user =
    JSON.parse(localStorage.getItem("user"));

if(user){

    document.getElementById("userName")
    .innerText = user.name;
}

// logout
function logout(){

    localStorage.removeItem("user");

    window.location.href = "login.html";
}

// =======================
// PARAMS
// =======================

const params =
    new URLSearchParams(window.location.search);

const id = params.get("id");

// =======================
// VARIABLES
// =======================

let images = [];
let current = 0;
let selectedSlotId = null;

let map;
let marker;

// =======================
// MAPA
// =======================

function initMap(lat, lng){

    map = L.map('map')
    .setView([lat, lng], 15);

    L.tileLayer(
        'https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',
        {
            attribution: '&copy; OpenStreetMap'
        }
    ).addTo(map);

    marker = L.marker([lat, lng]).addTo(map);
}

// =======================
// CARGAR PARKING
// =======================

fetch(`/api/parking/${id}`)
.then(res => res.json())
.then(p => {

    // info
    document.getElementById("title")
    .innerText = p.title;

    document.getElementById("location")
    .innerText = "📍 " + p.location;

    document.getElementById("description")
    .innerText = p.description;

    document.getElementById("price")
    .innerText = "€" + p.price;

    // imágenes
    images =
        (p.images && p.images.length > 0)
        ? p.images
        : [];

    if(images.length > 0){

        document.getElementById("imageWrapper")
        .classList.remove("hidden");

        showImage();
    }

    // mapa
    if(p.latitude && p.longitude){

        initMap(p.latitude, p.longitude);

    } else {

        document.getElementById("map").innerHTML = `
            <div class="w-full h-full bg-gray-200 rounded-xl flex items-center justify-center">
                Ubicación no disponible
            </div>
        `;
    }

    // slots
    const container =
        document.getElementById("slotsContainer");

    p.availabilitySlots.forEach(slot => {

        const div =
            document.createElement("div");

        div.className =
            "p-5 border rounded-xl transition";

        if(!slot.available){

            div.classList.add(
                "bg-gray-200",
                "cursor-not-allowed"
            );

        } else {

            div.classList.add(
                "cursor-pointer",
                "hover:bg-gray-100"
            );
        }

        div.innerHTML = `
            <div class="flex justify-between items-center">

                <div>

                    <div class="font-bold text-lg">
                        ${slot.date}
                    </div>

                    <div class="text-gray-500">
                        ${slot.startTime} - ${slot.endTime}
                    </div>

                </div>

                ${
                    slot.available
                    ? `<span class="text-green-600 font-semibold">
                        Disponible
                       </span>`
                    : `<span class="text-red-500 font-semibold">
                        Reservado
                       </span>`
                }

            </div>
        `;

        if(slot.available){

            div.onclick = () => {

                document.querySelectorAll("#slotsContainer div")
                .forEach(d =>
                    d.classList.remove(
                        "bg-blue-100",
                        "border-blue-500"
                    )
                );

                div.classList.add(
                    "bg-blue-100",
                    "border-blue-500"
                );

                selectedSlotId = slot.id;
            };
        }

        container.appendChild(div);
    });
});

// =======================
// IMÁGENES
// =======================

function showImage(){

    document.getElementById("mainImage").src =
        images[current];
}

function nextImage(){

    current = (current + 1) % images.length;

    showImage();
}

function prevImage(){

    current =
        (current - 1 + images.length)
        % images.length;

    showImage();
}

// =======================
// MODAL PAGO
// =======================

function openPaymentModal(){

    if(!selectedSlotId){

        alert("Selecciona una franja");

        return;
    }

    document.getElementById("paymentModal")
    .classList.remove("hidden");
}

function closePaymentModal(){

    document.getElementById("paymentModal")
    .classList.add("hidden");
}

// =======================
// PROCESAR PAGO
// =======================

async function processPayment(){

    const cardNumber =
        document.getElementById("cardNumber")
        .value
        .replaceAll(" ", "");

    // tarjeta fake válida
    if(cardNumber !== "4242424242424242"){

        alert(
            "Tarjeta rechazada.\nUsa: 4242 4242 4242 4242"
        );

        return;
    }

    // loading
    document.getElementById("loadingPayment")
    .classList.remove("hidden");

    // simulación pago
    setTimeout(async () => {

        const res = await fetch(
            "/api/reservations",
            {
                method: "POST",

                headers: {
                    "Content-Type": "application/json"
                },

                body: JSON.stringify({

                    userId: user.id,

                    parkingSpotId: id,

                    slotId: selectedSlotId
                })
            }
        );

        if(res.ok){

            const data = await res.json();

            document.getElementById("paymentModal")
            .innerHTML = `

                <div class="bg-white p-8 rounded-2xl text-center w-[450px]">

                    <div class="text-6xl mb-4">
                        
                    </div>

                    <h2 class="text-3xl font-bold mb-4">
                        Pago completado
                    </h2>

                    <p class="text-gray-600 mb-2">
                        Tu código de acceso
                    </p>

                    <p class="text-4xl font-bold text-blue-600 mb-6">
                        ${data.accessCode}
                    </p>

                    <button
                    onclick="location.href='index.html'"
                    class="bg-black text-white px-6 py-3 rounded-xl w-full">

                    Volver al inicio

                    </button>

                </div>
            `;

        } else {

            alert("Error al reservar");
        }

    }, 2500);
}

</script>

</body>
</html>
