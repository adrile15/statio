<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Mis Reservas</title>
<script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-gray-100">

<div class="flex justify-between items-center p-4 bg-white shadow">
    <div class="text-xl font-bold text-blue-600">Ⓟ Statio</div>

    <div class="flex items-center gap-6">
        <a href="javascript:history.back()" class="hover:underline">Volver</a>
        <span id="userName" class="font-semibold"></span>
        <button onclick="logout()" class="text-red-500">Salir</button>
    </div>
</div>

<div class="max-w-4xl mx-auto mt-10">

<h1 class="text-3xl font-bold mb-2">Mis Reservas</h1>
<p class="text-gray-500 mb-6">
Gestiona tus reservas y accede a tus códigos de acceso
</p>

<!-- TABS -->
<div class="flex bg-gray-200 rounded-full p-1 mb-6">
    <button id="tabActive" onclick="showActive()"
    class="flex-1 py-2 rounded-full bg-white">
        Activas (<span id="activeCount">0</span>)
    </button>

    <button id="tabHistory" onclick="showHistory()"
    class="flex-1 py-2 rounded-full">
        Historial (<span id="historyCount">0</span>)
    </button>
</div>

<div id="reservationsContainer" class="space-y-6"></div>

</div>

<script>

const user = JSON.parse(localStorage.getItem("user"));
if (!user) window.location.href = "login.html";

document.getElementById("userName").innerText = user.name;

let activeReservations = [];
let historyReservations = [];

loadReservations();

function loadReservations(){

fetch(`/api/reservations/user/${user.id}`)
.then(res => res.json())
.then(reservations => {

    const now = new Date();

    activeReservations = reservations.filter(r => {
        const end = new Date(`${r.slot.date}T${r.slot.endTime}`);
        return end > now;
    });

    historyReservations = reservations.filter(r => {
        const end = new Date(`${r.slot.date}T${r.slot.endTime}`);
        return end <= now;
    });

    document.getElementById("activeCount").innerText = activeReservations.length;
    document.getElementById("historyCount").innerText = historyReservations.length;

    showActive();
});
}

// MOSTRAR ACTIVAS
function showActive(){
    renderReservations(activeReservations);
    setTab("active");
}

// MOSTRAR HISTORIAL
function showHistory(){
    renderReservations(historyReservations);
    setTab("history");
}

// RENDER
function renderReservations(list){

    const container = document.getElementById("reservationsContainer");
    container.innerHTML = "";

    if(list.length === 0){
        container.innerHTML = "<p class='text-gray-500'>No hay reservas</p>";
        return;
    }

    list.forEach(r => {

        const statusColor = r.status === "USED"
            ? "bg-gray-500"
            : "bg-green-500";

        const card = document.createElement("div");
        card.className = "bg-white p-6 rounded-xl shadow";

        card.innerHTML = `
            <div class="flex justify-between items-center mb-2">
                <h2 class="text-xl font-bold">${r.parkingSpot.title}</h2>
                <span class="${statusColor} text-white text-sm px-3 py-1 rounded-full">
                    ${r.status}
                </span>
            </div>

            <p class="text-gray-500 mb-4">📍 ${r.parkingSpot.location}</p>

            <div class="flex justify-between mb-4">
                <div>
                    <p class="text-gray-400 text-sm">Fecha</p>
                    <p class="font-semibold">${formatDate(r.slot.date)}</p>
                </div>

                <div>
                    <p class="text-gray-400 text-sm">Horario</p>
                    <p class="font-semibold">
                        ${r.slot.startTime} - ${r.slot.endTime}
                    </p>
                </div>
            </div>

            <div class="bg-blue-50 border border-blue-200 p-4 rounded-lg flex justify-between items-center mb-4">
                <div>
                    <p class="text-sm text-gray-500">Código de acceso</p>
                    <p class="text-xl font-bold">${r.accessCode}</p>
                </div>

                <button onclick="copyCode('${r.accessCode}')"
                class="bg-white border px-3 py-1 rounded">
                    Copiar
                </button>
            </div>

            <div class="flex gap-4">
                <a href="parking-details.html?id=${r.parkingSpot.id}"
                class="flex-1 text-center border py-2 rounded">
                    Ver detalles
                </a>

                ${
                    (r.status === "USED" || isPast(r))
                    ? ""
                    : `<button onclick="cancelReservation(${r.id})"
                       class="flex-1 text-center border py-2 rounded text-red-500">
                       Cancelar reserva
                       </button>`
                }
            </div>
        `;

        container.appendChild(card);
    });
}

// COMPROBAR SI YA PASÓ
function isPast(r){
    const end = new Date(`${r.slot.date}T${r.slot.endTime}`);
    return end <= new Date();
}

// ESTILO TABS
function setTab(tab){

    const activeBtn = document.getElementById("tabActive");
    const historyBtn = document.getElementById("tabHistory");

    if(tab === "active"){
        activeBtn.classList.add("bg-white");
        historyBtn.classList.remove("bg-white");
    } else {
        historyBtn.classList.add("bg-white");
        activeBtn.classList.remove("bg-white");
    }
}

// CANCELAR
async function cancelReservation(id){

    const confirmacion = confirm("¿Seguro que quieres cancelar la reserva?");
    if(!confirmacion) return;

    const res = await fetch(`/api/reservations/${id}`, {
        method: "DELETE"
    });

    if(res.ok){
        alert("Reserva cancelada");
        loadReservations();
    } else {
        alert("Error al cancelar");
    }
}

// UTILIDADES
function formatDate(dateStr){
    const date = new Date(dateStr);
    return date.toLocaleDateString("es-ES", {
        weekday: "long",
        day: "numeric",
        month: "long"
    });
}

function copyCode(code){
    navigator.clipboard.writeText(code);
    alert("Código copiado");
}

function logout(){
    localStorage.removeItem("user");
    window.location.href="login.html";
}

</script>

</body>
</html>
