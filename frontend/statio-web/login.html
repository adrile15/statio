<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Statio - Login</title>

<script src="https://cdn.tailwindcss.com"></script>

</head>

<body class="bg-gray-100 flex items-center justify-center h-screen">

<div class="bg-white p-10 rounded-xl shadow-md w-96">

<div class="text-center mb-6">
<div class="text-3xl font-bold text-blue-600">Ⓟ Statio</div>
<h2 class="text-2xl font-semibold mt-4">Iniciar Sesión</h2>
<p class="text-gray-500 text-sm mt-2">Ingresa tus credenciales para acceder a tu cuenta</p>
</div>

<form>

<label class="block text-sm font-medium mb-1">Email</label>
<input type="email" placeholder="tu@email.com"
class="w-full p-3 mb-4 border rounded-lg bg-gray-100">

<label class="block text-sm font-medium mb-1">Contraseña</label>
<input type="password"
class="w-full p-3 mb-6 border rounded-lg bg-gray-100">

<button
class="w-full bg-black text-white p-3 rounded-lg hover:bg-gray-800 transition">
Iniciar Sesión
</button>

</form>

<p class="text-sm text-center mt-6">
¿No tienes cuenta?
<a href="register.html" class="text-blue-500 hover:underline">
Regístrate aquí
</a>
</p>

</div>

</body>
</html>
