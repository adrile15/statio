<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Crear Plaza</title>

<script src="https://cdn.tailwindcss.com"></script>

</head>

<body class="bg-gray-100 flex items-center justify-center h-screen">

<div class="bg-white p-10 rounded-xl shadow-md w-96">

<h2 class="text-2xl font-semibold mb-6 text-center">
Publicar Plaza
</h2>

<form id="parkingForm">

<input id="title" type="text" placeholder="Título"
class="w-full p-3 mb-4 border rounded-lg bg-gray-100" required>

<input id="location" type="text" placeholder="Ubicación"
class="w-full p-3 mb-4 border rounded-lg bg-gray-100" required>

<input id="price" type="number" placeholder="Precio €/hora"
class="w-full p-3 mb-4 border rounded-lg bg-gray-100" required>

<textarea id="description" placeholder="Descripción"
class="w-full p-3 mb-6 border rounded-lg bg-gray-100"></textarea>

<button
class="w-full bg-black text-white p-3 rounded-lg hover:bg-gray-800">
Publicar
</button>

</form>

</div>

<script>

const user = JSON.parse(localStorage.getItem("user"));

if (!user) {
    alert("Debes iniciar sesión");
    window.location.href = "login.html";
}

document.getElementById("parkingForm").addEventListener("submit", async function(e) {
    e.preventDefault();

    const data = {
        title: document.getElementById("title").value,
        location: document.getElementById("location").value,
        price: document.getElementById("price").value,
        description: document.getElementById("description").value,
        userId: user.id
    };

    const response = await fetch("/api/parking", {
        method: "POST",
        headers: {
            "Content-Type": "application/json"
        },
        body: JSON.stringify(data)
    });

    if (response.ok) {
        alert("Plaza creada correctamente");
        window.location.href = "index.html";
    } else {
        alert("Error al crear la plaza");
    }
});

</script>

</body>
</html>
